<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
:root{
  --bg:#0b0b0f;
  --card:#12121a;
  --muted:#a0a0b2;
  --accent:#8b5cf6; /* violet */
  --accent-soft:rgba(139,92,246,0.15);
}

*{box-sizing:border-box}

body {
  margin:0;
  font-family: Inter, Arial, sans-serif;
  background: radial-gradient(1200px 600px at 50% -200px, #1a1a2e 0%, var(--bg) 60%);
  color:white;
}

header {
  text-align:center;
  padding:18px 10px 6px;
  font-size:28px;
  font-weight:800;
  letter-spacing:0.5px;
}

header span {
  color:var(--accent);
}

.container {
  padding:14px;
  max-width:820px;
  margin:10px auto 80px;
}

.section {
  background:linear-gradient(180deg, #151522, #101019);
  margin:14px 0;
  padding:16px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.05);
}

.section h3 {
  color:var(--accent);
  margin:0 0 10px;
}

.section p { margin:6px 0; color:#e5e7eb; }
.section a { color:#c4b5fd; text-decoration:none; }
.section a:hover { text-decoration:underline; }

.badge {
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:var(--accent-soft);
  color:#ddd6fe;
  font-size:12px;
  margin-left:6px;
}

.note-wrap{
  position:fixed;
  left:12px;
  top:50%;
  transform:translateY(-50%);
}

.note-box {
  width:210px;
  background:linear-gradient(180deg, #151522, #101019);
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.note-title{ font-weight:700; }
.note-sub{ color:var(--muted); font-size:12px; margin-left:6px; }

.note-box textarea {
  width:100%;
  height:110px;
  margin-top:8px;
  background:#0b0b0f;
  color:white;
  border:1px solid #26263a;
  border-radius:10px;
  padding:8px;
  resize:none;
}

.note-actions{ display:flex; gap:8px; margin-top:8px; }

.btn{
  flex:1;
  padding:8px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

.btn.secondary{ background:#1f1f2e; }

.toast{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  background:#1f1f2e;
  color:#e5e7eb;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

.chatbot {
  position:fixed;
  bottom:12px;
  left:12px;
  width:260px;
  background:linear-gradient(180deg, #151522, #101019);
  border-radius:14px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.chatbot input {
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #26263a;
  background:#0b0b0f;
  color:white;
}

#chatOutput{ margin-top:6px; color:#d1d5db; font-size:14px; }

/* small screens */
@media(max-width:700px){
  .note-wrap{ position:static; transform:none; margin:10px; }
  .chatbot{ left:auto; right:10px; }
}
</style>
</head>

<body>

<header>BTECH <span>25 29</span></header>

<!-- 📌 Note Box with save (only you can see) -->
<div class="note-wrap">
  <div class="note-box">
    <div class="note-title">Notes <span class="note-sub">(only you can see)</span></div>
    <textarea id="noteArea" placeholder="Write here..."></textarea>
    <div class="note-actions">
      <button class="btn" onclick="saveNote()">Save</button>
      <button class="btn secondary" onclick="clearNote()">Clear</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="section">
    <h3>Notice</h3>
    <p style="color:white;">NO UPDATE</p>
  </div>

  <div class="section">
    <h3>Books</h3>
    <p style="color:white;">NO UPDATE</p>
  </div>

  <div class="section">
    <h3>Practical</h3>
    <p style="color:white;">NO UPDATE</p>
  </div>

  <div class="section">
    <h3>Important Notes</h3>
    <p>math play list for 2nd sem</p>
    <a href="https://youtube.com/playlist?list=PLn3Wz38keZOfqVnFaM5bhlGVj8pnKntfW&si=TkjuvCdfZabbt4WY" target="_blank">Open Playlist</a>
  </div>

</div>

<div class="toast" id="toast">Saved</div>

<!-- 🤖 Chatbot -->
<div class="chatbot">
  🤖<br>
  <input id="chatInput" placeholder="Type message..." onkeydown="chat(event)">
  <div id="chatOutput"></div>
</div>

<script>
// 📝 Notes (only you) with localStorage
const NOTE_KEY = 'apm_note_v1';
const noteArea = document.getElementById('noteArea');

function loadNote(){
  const saved = localStorage.getItem(NOTE_KEY);
  if(saved) noteArea.value = saved;
}

function saveNote(){
  localStorage.setItem(NOTE_KEY, noteArea.value);
  showToast('Saved');
}

function clearNote(){
  localStorage.removeItem(NOTE_KEY);
  noteArea.value = '';
  showToast('Cleared');
}

function showToast(text){
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1200);
}

loadNote();

// 🔄 Real-time updates (auto refresh every 10s)
setInterval(()=>{
  // placeholder for future online data; currently just a visual ping
  console.log('sync');
}, 10000);

// 🤖 Chatbot
function chat(e){
  if(e.key==='Enter'){
    let msg=e.target.value.toLowerCase();
    let out=document.getElementById('chatOutput');

    if(msg.includes('hi')||msg.includes('hello')||msg.includes('hey')||msg.includes('whatsup')){
      out.innerHTML='Hi I am APM chatbot, how can I help you?';
    } else {
      window.open('https://www.google.com/search?q='+encodeURIComponent(msg));
      out.innerHTML='For more contact CRS...';
    }

    e.target.value='';
  }
}
</script>

</body>
</html>
