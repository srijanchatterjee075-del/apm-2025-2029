<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM 25-29 | Mobile Pro</title>

<style>
:root {
  --primary: #8a2be2;
  --bg: #0a0a0a;
  --card: #161616;
  --red: #ff3131;
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', Roboto, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: white;
  padding-bottom: 140px;
}

header {
  background: var(--primary);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

#profileArea {
  text-align: center;
  padding: 20px;
}

#dp {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--primary);
}

#adminPanel {
  display: none;
  margin: 15px;
  padding: 15px;
  background: #1a1a1a;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #000;
  color: white;
}

button {
  background: var(--primary);
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 10px;
}

.section {
  background: var(--card);
  padding: 15px;
  border-radius: 10px;
}

.item {
  background: #222;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.item a {
  color: #00d4ff;
  display: block;
  margin-top: 5px;
}

.del-btn {
  background: var(--red);
  margin-top: 8px;
}

.new-tag {
  color: var(--red);
  font-size: 11px;
  margin-left: 5px;
}

#searchBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  padding: 10px;
}

.search-flex {
  display: flex;
  gap: 10px;
}

.search-flex input {
  flex: 1;
}
</style>
</head>

<body>

<header>
  <strong>APM 25-29</strong>
  <div onclick="checkAdmin()">⋮</div>
</header>

<div id="profileArea">
  <img id="dp" src="https://via.placeholder.com/100">
</div>

<div id="adminPanel">
  <input type="file" id="dpFile" accept="image/*">
  <select id="sec">
    <option value="notices">Notice</option>
    <option value="announcements">Announcement</option>
    <option value="study">Study</option>
    <option value="practicals">Practical</option>
  </select>
  <input id="txt" placeholder="Text">
  <input id="link" placeholder="Link">
  <button onclick="upload()">Upload</button>
</div>

<div class="container">
  <div class="section"><h4>Notices</h4><div id="notices"></div></div>
  <div class="section"><h4>Announcements</h4><div id="announcements"></div></div>
  <div class="section"><h4>Study</h4><div id="study"></div></div>
  <div class="section"><h4>Practical</h4><div id="practicals"></div></div>
</div>

<div id="searchBox">
  <form class="search-flex" action="https://google.com/search" target="_blank">
    <input name="q" placeholder="Search">
    <button>Go</button>
  </form>
</div>

<script>
const KEY = "admin123";
let isAdmin = false;

window.onload = () => {
  load();
};

function checkAdmin() {
  const pass = prompt("Enter key");
  if(pass === KEY) {
    isAdmin = true;
    document.getElementById('adminPanel').style.display = 'block';
    load();
  }
}

document.getElementById('dpFile').onchange = function() {
  const file = this.files[0];
  if(!file) return;
  if(file.size > 2 * 1024 * 1024) {
    alert("Max 2MB"); return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    localStorage.setItem('dp', e.target.result);
    document.getElementById('dp').src = e.target.result;
  };
  reader.readAsDataURL(file);
};

function upload() {
  const s = sec.value;
  const t = txt.value;
  if(!t) return;

  const data = JSON.parse(localStorage.getItem(s) || '[]');
  data.push({id: Date.now(), text: t, link: link.value});
  localStorage.setItem(s, JSON.stringify(data));

  txt.value = '';
  link.value = '';
  load();
}

function load() {
  ['notices','announcements','study','practicals'].forEach(s => {
    const box = document.getElementById(s);
    box.innerHTML = '';

    const data = JSON.parse(localStorage.getItem(s) || '[]');

    data.reverse().forEach(item => {
      const d = document.createElement('div');
      d.className = 'item';
      d.innerHTML = item.text;

      if(item.link) {
        d.innerHTML += `<a href="${item.link}" target="_blank">Open</a>`;
      }

      if(isAdmin) {
        const b = document.createElement('button');
        b.innerText = 'Delete';
        b.className = 'del-btn';
        b.onclick = () => {
          const filtered = data.filter(i => i.id !== item.id);
          localStorage.setItem(s, JSON.stringify(filtered));
          load();
        };
        d.appendChild(b);
      }

      box.appendChild(d);
    });
  });

  const dp = localStorage.getItem('dp');
  if(dp) document.getElementById('dp').src = dp;
}
</script>

</body>
</html>
