<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APM 2025-2029 | Mobile Pro</title>
    <style>
        :root { --primary: #8a2be2; --accent: #ee82ee; --bg: #0a0a0a; --card: #1a1a1a; }
        
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 100px; -webkit-font-smoothing: antialiased; }

        /* Header */
        header { 
            background: var(--primary); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        /* Profile Area */
        #profileSection { text-align: center; padding: 20px; }
        #profilePic { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 3px solid var(--primary); object-fit: cover; 
        }

        /* Responsive Grid */
        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; padding: 10px; 
        }

        .section { background: var(--card); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); }
        
        /* Mobile-Friendly Inputs */
        input, select, button { 
            width: 100%; padding: 12px; margin: 5px 0; 
            border-radius: 8px; border: 1px solid #333; 
            background: #000; color: white; font-size: 16px; /* 16px prevents iOS zoom */
        }

        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; }
        
        #adminDashboard { 
            display: none; background: #222; margin: 10px; padding: 15px; 
            border: 2px dashed var(--accent); border-radius: 10px; 
        }

        .item-card { background: #252525; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .item-card img { max-width: 100%; border-radius: 5px; margin-top: 5px; }

        /* Fixed Mobile Chatbot */
        #chatbot { 
            position: fixed; bottom: 10px; right: 10px; left: 10px; 
            background: #111; border: 2px solid var(--primary); border-radius: 12px;
        }
        .chat-row { display: flex; padding: 5px; }
        #chatInput { margin: 0; flex: 1; }
    </style>
</head>
<body>

<header>
    <strong>APM 2025-2029</strong>
    <div onclick="askPass()" style="font-size:30px; cursor:pointer">⋮</div>
</header>

<div id="profileSection">
    <img id="profilePic" src="https://via.placeholder.com/100">
</div>

<div id="adminDashboard">
    <h3>🛠 Admin Tools</h3>
    <input type="file" id="dpUpload" accept="image/*">
    <select id="secSelect">
        <option value="notice">Important Notice</option>
        <option value="announcement">Announcement</option>
        <option value="study">Study Material</option>
        <option value="practical">Practical</option>
    </select>
    <input type="text" id="textIn" placeholder="Enter content...">
    <input type="file" id="fileIn" accept="image/*">
    <button onclick="publish()">Update Page</button>
</div>

<div class="container">
    <div class="section"><h4>📢 Notice</h4><div id="notice"></div></div>
    <div class="section"><h4>📣 Announcement</h4><div id="announcement"></div></div>
    <div class="section"><h4>📚 Study</h4><div id="study"></div></div>
    <div class="section"><h4>🔬 Practical</h4><div id="practical"></div></div>
</div>

<div id="chatbot">
    <div class="chat-row">
        <input type="text" id="chatIn" placeholder="Search Google...">
        <button onclick="doSearch()" style="width:60px">Go</button>
    </div>
</div>

<script>
const PASS = "apmarya81120252026chatt9476gcetts";

// Load Data
window.onload = () => {
    const pic = localStorage.getItem("apm_p");
    if(pic) document.getElementById("profilePic").src = pic;

    ['notice', 'announcement', 'study', 'practical'].forEach(s => {
        const saved = JSON.parse(localStorage.getItem("apm_"+s)) || [];
        saved.forEach(item => render(s, item.t, item.f, item.id));
    });
};

function askPass() {
    if(prompt("Password:") === PASS) document.getElementById("adminDashboard").style.display="block";
}

// Profile Pic + Compression
document.getElementById("dpUpload").onchange = function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        // Resize image to save space
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 200;
            ctx.drawImage(img, 0, 0, 200, 200);
            const smallPic = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById("profilePic").src = smallPic;
            localStorage.setItem("apm_p", smallPic);
        };
    };
    reader.readAsDataURL(this.files[0]);
};

function publish() {
    const s = document.getElementById("secSelect").value;
    const t = document.getElementById("textIn").value;
    const f = document.getElementById("fileIn").files[0];
    const id = Date.now();

    if(f) {
        const reader = new FileReader();
        reader.onload = (e) => save(s, t, e.target.result, id);
        reader.readAsDataURL(f);
    } else {
        save(s, t, null, id);
    }
}

function save(s, t, f, id) {
    try {
        const data = JSON.parse(localStorage.getItem("apm_"+s)) || [];
        data.push({id, t, f});
        localStorage.setItem("apm_"+s, JSON.stringify(data));
        render(s, t, f, id);
    } catch(e) {
        alert("Memory Full! Try a smaller image.");
    }
}

function render(s, t, f, id) {
    const div = document.createElement("div");
    div.className = "item-card";
    div.id = id;
    div.innerHTML = `<p>${t}</p>${f ? `<img src="${f}">` : ''}`;
    const btn = document.createElement("button");
    btn.textContent = "🗑"; btn.style.width="40px";
    btn.onclick = () => {
        div.remove();
        let list = JSON.parse(localStorage.getItem("apm_"+s));
        localStorage.setItem("apm_"+s, JSON.stringify(list.filter(i => i.id !== id)));
    };
    div.appendChild(btn);
    document.getElementById(s).prepend(div);
}

function doSearch() {
    const q = document.getElementById("chatIn").value;
    if(q) window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}
</script>
</body>
</html>
