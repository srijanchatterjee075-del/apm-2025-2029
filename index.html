<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APM 2025-2029 | AI Pro</title>
    <style>
        :root { 
            --primary: #8a2be2; 
            --accent: #ee82ee; 
            --bg: #0a0a0a; 
            --card: #1a1a1a; 
            --chat-bg: #121212;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 70px; }

        /* Header */
        header { 
            background: var(--primary); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        /* Container */
        .container { display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary); }

        /* --- AI CHATBOT UI --- */
        #chatContainer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--chat-bg);
            border-top: 2px solid var(--primary);
            transition: height 0.3s ease;
            height: 60px; /* Closed state */
            z-index: 2000;
            display: flex; flex-direction: column;
        }

        #chatContainer.open { height: 70vh; } /* Open state (70% of screen) */

        .chat-header {
            padding: 15px; background: #1a1a1a;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-weight: bold; color: var(--accent);
        }

        #chatBody {
            flex: 1; overflow-y: auto; padding: 15px;
            display: none; flex-direction: column; gap: 10px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80% ; font-size: 14px; line-height: 1.4; }
        .user-msg { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        .chat-input-area {
            display: flex; padding: 10px; gap: 8px; background: #000;
        }

        #chatIn { 
            flex: 1; height: 40px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 20px; padding: 0 15px; font-size: 16px;
        }

        #sendBtn { 
            width: 60px; height: 40px; background: var(--primary); 
            border: none; border-radius: 20px; color: white; font-weight: bold;
        }

        /* Admin Dashboard Hidden */
        #adminDashboard { display: none; background: #1a1a1a; margin: 10px; padding: 15px; border: 2px dashed var(--accent); border-radius: 12px; }
        .item-card { background: #252525; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .item-card img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <strong>APM 2025-2029</strong>
    <div onclick="askPass()" style="cursor:pointer; font-size: 24px;">⋮</div>
</header>

<div id="adminDashboard">
    <input type="text" id="textIn" placeholder="Post update...">
    <button onclick="publish()">Update Page</button>
</div>

<div class="container">
    <div class="section"><h4>📢 Notice</h4><div id="notice"></div></div>
    <div class="section"><h4>📚 Study</h4><div id="study"></div></div>
</div>

<div id="chatContainer">
    <div class="chat-header" onclick="toggleChat()">
        <span>✨ APM AI Assistant</span>
        <span id="chevron">▲</span>
    </div>
    
    <div id="chatBody">
        <div class="msg bot-msg">Hello! I am the APM AI. How can I help you today?</div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatIn" placeholder="Ask me anything...">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const PASS = "apmarya81120252026chatt9476gcetts";

// CHAT LOGIC
function toggleChat() {
    const container = document.getElementById('chatContainer');
    const body = document.getElementById('chatBody');
    const chevron = document.getElementById('chevron');
    
    container.classList.toggle('open');
    if(container.classList.contains('open')) {
        body.style.display = 'flex';
        chevron.innerText = '▼';
    } else {
        body.style.display = 'none';
        chevron.innerText = '▲';
    }
}

async function sendMessage() {
    const input = document.getElementById('chatIn');
    const body = document.getElementById('chatBody');
    const val = input.value.trim();

    if(!val) return;

    // 1. Add User Message
    addMessage(val, 'user-msg');
    input.value = '';

    // 2. Show Typing...
    const typingId = "typing-" + Date.now();
    addMessage("Thinking...", 'bot-msg', typingId);

    // 3. Simulated AI Response (You can connect a real API here)
    setTimeout(() => {
        document.getElementById(typingId).remove();
        const response = getAIResponse(val);
        addMessage(response, 'bot-msg');
        body.scrollTop = body.scrollHeight; // Auto-scroll
    }, 1000);
}

function addMessage(text, className, id = '') {
    const body = document.getElementById('chatBody');
    const div = document.createElement('div');
    div.className = `msg ${className}`;
    if(id) div.id = id;
    div.innerText = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function getAIResponse(query) {
    query = query.toLowerCase();
    if(query.includes("hello") || query.includes("hi")) return "Hello! Welcome to the APM Portal.";
    if(query.includes("exam")) return "Check the Notice section for the latest exam dates.";
    if(query.includes("who made")) return "This portal was developed for APM 2025-2029.";
    if(query.includes("study")) return "You can find PDF materials in the Study section.";
    
    // Default: Search Fallback
    return "I'm still learning! You can also find more info on Google: https://google.com/search?q=" + encodeURIComponent(query);
}

// ADMIN LOGIC (Simplified)
function askPass() {
    if(prompt("Admin Password:") === PASS) document.getElementById("adminDashboard").style.display="block";
}

function publish() {
    const t = document.getElementById("textIn").value;
    if(t) {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerText = t;
        document.getElementById("notice").prepend(div);
        document.getElementById("textIn").value = "";
    }
}
</script>

</body>
</html>
