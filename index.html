<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0f;color:white;}
header{text-align:center;padding:15px;font-size:28px;font-weight:bold;}
header span{color:violet;}
.container{padding:10px;max-width:800px;margin:auto;}
.section{background:#111;margin:10px 0;padding:15px;border-radius:14px;}
.section h3{color:violet;}

.clock{text-align:center;margin-top:15px;font-size:30px;font-weight:bold;background:#111;padding:15px;border-radius:12px;animation:glow 1.5s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 10px violet;}to{box-shadow:0 0 25px violet;}}

.todo{background:#111;margin:10px;padding:12px;border-radius:12px;position:relative;}
.todo input{width:100%;padding:6px;margin-top:5px;border-radius:6px;border:1px solid #333;background:black;color:white;}
.todo-item{margin-top:8px;background:#000;padding:8px;border-radius:6px;}
.completed{opacity:0.4;text-decoration:line-through;}

.circle{
position:absolute;right:-25px;top:50%;transform:translateY(-50%);
width:20px;height:20px;border-radius:50%;
animation:float 2s infinite ease-in-out;
}
@keyframes float{
0%{transform:translateY(-50%) translateY(0);} 
50%{transform:translateY(-50%) translateY(-8px);} 
100%{transform:translateY(-50%) translateY(0);} }

.red{background:red;box-shadow:0 0 10px red;}
.orange{background:orange;box-shadow:0 0 10px orange;}
.green{background:lime;box-shadow:0 0 10px lime;}
.blue{background:cyan;box-shadow:0 0 10px cyan;}

.chatbot{position:fixed;bottom:10px;left:10px;width:250px;background:#111;padding:10px;border-radius:10px;}
.chatbot input{width:100%;padding:5px;}
</style>
</head>
<body>

<header>BTECH <span>25 29</span></header>

<div class="container">
<div class="clock" id="clock"></div>

<div class="todo">
<div id="circle" class="circle"></div>
<b>Todo List</b>
<input id="todoInput" placeholder="Task">
<input type="datetime-local" id="deadlineInput">
<button onclick="addTodo()">Add</button>
<div id="todoList"></div>
</div>
</div>

<div class="chatbot">
🤖
<input id="chatInput" onkeydown="chat(event)">
<div id="chatOutput"></div>
</div>

<script>
// CLOCK
setInterval(()=>{
clock.innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

// LOAD TASKS
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTodo(){
let t=todoInput.value,d=deadlineInput.value;
if(!t||!d)return;
tasks.push({t,d,done:false});
saveTasks();
render();
}

function render(){
todoList.innerHTML="";
let total=tasks.length;
let done=tasks.filter(t=>t.done).length;
let remain=total-done;
let percent= total? (remain/total)*100 : 0;

// circle color
let c=circle;
c.className="circle";
if(percent>66) c.classList.add("red");
else if(percent>33) c.classList.add("orange");
else if(percent>0) c.classList.add("green");
else c.classList.add("blue");

// render tasks
tasks.forEach((task,i)=>{
let div=document.createElement("div");
div.className="todo-item";
div.innerHTML=`
<input type='checkbox' ${task.done?"checked":""} onchange='toggle(${i})'>
<span class='${task.done?"completed":""}'>${task.t}</span>
<button onclick='remove(${i})'>X</button>
<div>${new Date(task.d).toLocaleString()}</div>`;
todoList.appendChild(div);
});
}

function toggle(i){
tasks[i].done=!tasks[i].done;
saveTasks();
render();
}

function remove(i){
tasks.splice(i,1);
saveTasks();
render();
}

render();

// CHATBOT
function chat(e){
if(e.key==='Enter'){
let msg=e.target.value.toLowerCase();
if(msg.includes("show my tasks")){
let list=tasks.map(t=>`${t.t} (Due: ${new Date(t.d).toLocaleString()})`).join("\n");
chatOutput.innerText=list||"No tasks";
}else{
window.open("https://www.google.com/search?q="+msg);
}
e.target.value="";
}
}
</script>
</body>
</html>
