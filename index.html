<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM 2025-2029</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:white;
}

header{
background:#8a2be2;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.menu{
cursor:pointer;
font-size:26px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.section{
background:#1a1a1a;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.section h2{
color:#ee82ee;
margin-top:0;
}

.card{
background:#222;
padding:12px;
margin-top:10px;
border-radius:8px;
}

img{
max-width:100%;
border-radius:6px;
}

button{
background:#8a2be2;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

button:hover{
background:#a64dff;
}

.delete{
background:red;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:none;
background:#000;
color:white;
}

#profile{
text-align:center;
padding:20px;
}

#profile img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid #8a2be2;
object-fit:cover;
}

/* Admin panel */
#adminPanel{
display:none;
background:#111;
padding:20px;
margin-top:20px;
border-radius:10px;
}

/* Chatbot */
#chatbot{
position:fixed;
bottom:20px;
right:20px;
width:260px;
background:#111;
border:2px solid #8a2be2;
border-radius:12px;
}

#chatHeader{
background:#8a2be2;
padding:8px;
font-weight:bold;
}

#chatMessages{
height:120px;
overflow:auto;
padding:8px;
font-size:13px;
}

.chatRow{
display:flex;
}

#chatInput{
flex:1;
border-radius:0;
}

#chatBtn{
width:60px;
}
</style>
</head>

<body>

<header>
APM 2025-2029
<div class="menu" onclick="login()">⋮</div>
</header>

<div class="container">

<div id="profile">
<img id="dp" src="https://via.placeholder.com/100">
</div>

<div id="adminPanel">
<h2>Admin Panel</h2>

<label>Change DP</label>
<input type="file" id="dpUpload">

<label>Select Section</label>
<select id="section">
<option value="notice">Important Notice</option>
<option value="announcement">Announcement</option>
<option value="study">Study Material</option>
<option value="practical">Practical</option>
</select>

<input type="text" id="text" placeholder="Write message">
<input type="file" id="file">

<button onclick="upload()">Upload</button>
</div>

<div class="section">
<h2>Important Notice</h2>
<div id="notice"></div>
</div>

<div class="section">
<h2>Announcement</h2>
<div id="announcement"></div>
</div>

<div class="section">
<h2>Study Material</h2>
<div id="study"></div>
</div>

<div class="section">
<h2>Practical</h2>
<div id="practical"></div>
</div>

</div>

<div id="chatbot">
<div id="chatHeader">Search Bot</div>
<div id="chatMessages"></div>
<div class="chatRow">
<input id="chatInput">
<button id="chatBtn" onclick="search()">Go</button>
</div>
</div>

<script>

const PASSWORD="apmarya81120252026chatt9476gcetts";

function login(){
let p=prompt("Enter admin password");
if(p===PASSWORD){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong password");
}
}

document.getElementById("dpUpload").onchange=function(){
let reader=new FileReader();
reader.onload=e=>{
document.getElementById("dp").src=e.target.result;
};
reader.readAsDataURL(this.files[0]);
};

function upload(){
let sec=document.getElementById("section").value;
let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

let container=document.getElementById(sec);
let card=document.createElement("div");
card.className="card";

if(text){
let p=document.createElement("p");
p.textContent=text;
card.appendChild(p);
}

if(file){
let reader=new FileReader();

reader.onload=e=>{
if(file.type.startsWith("image")){
let img=document.createElement("img");
img.src=e.target.result;
card.appendChild(img);
}else{
let a=document.createElement("a");
a.href=e.target.result;
a.target="_blank";
a.textContent="Open File";
a.style.color="violet";
card.appendChild(a);
}
};

reader.readAsDataURL(file);
}

let del=document.createElement("button");
del.textContent="Delete";
del.className="delete";
del.onclick=()=>card.remove();

card.appendChild(del);
container.prepend(card);

document.getElementById("text").value="";
document.getElementById("file").value="";
}

function search(){
let q=document.getElementById("chatInput").value;

if(!q) return;

let chat=document.getElementById("chatMessages");

chat.innerHTML+=`<div>You: ${q}</div>`;
chat.innerHTML+=`<div style="color:violet">Searching Google...</div>`;

window.open("https://www.google.com/search?q="+encodeURIComponent(q));

document.getElementById("chatInput").value="";
chat.scrollTop=chat.scrollHeight;
}

document.getElementById("chatInput").addEventListener("keypress",function(e){
if(e.key==="Enter") search();
});

</script>

</body>
</html>
