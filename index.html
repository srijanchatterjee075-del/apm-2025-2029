<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APM 2025-2029</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:white;
}

/* Header */
header{
background:#8a2be2;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.menu{
cursor:pointer;
font-size:26px;
}

/* Container */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* Profile */
#profile{
text-align:center;
padding:20px 10px;
}

#dp{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #8a2be2;
object-fit:cover;
background:#222;
box-shadow:0 0 15px #8a2be2;
}

/* Mobile */
@media(max-width:600px){
#dp{width:85px;height:85px;}
header{font-size:18px;}
}

/* Sections */
.section{
background:#1a1a1a;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.section h2{
margin-top:0;
color:#d18cff;
}

/* Card */
.card{
background:#222;
padding:12px;
margin-top:12px;
border-radius:8px;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.card img{
width:100%;
border-radius:6px;
margin-top:8px;
}

.card a{
color:#d18cff;
display:block;
margin-top:6px;
}

/* Inputs */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:none;
background:#000;
color:white;
}

button{
background:#8a2be2;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

.delete{
background:red;
}

/* Admin */
#admin{
display:none;
background:#111;
padding:15px;
margin-top:15px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
APM 2025-2029
<div class="menu" onclick="adminLogin()">⋮</div>
</header>

<div class="container">

<!-- Profile -->
<div id="profile">
<img id="dp" src="https://via.placeholder.com/150">
</div>

<!-- Admin Panel -->
<div id="admin">
<h2>Admin Panel</h2>

<label>Change DP</label>
<input type="file" id="dpUpload" accept="image/*">

<label>Select Section</label>
<select id="section">
<option value="notice">Important Notice</option>
<option value="announcement">Announcement</option>
<option value="study">Study Material</option>
<option value="practical">Practical</option>
</select>

<input type="text" id="text" placeholder="Write text">
<input type="file" id="file">

<button onclick="upload()">Upload</button>
</div>

<!-- Sections -->
<div class="section">
<h2>Important Notice</h2>
<div id="notice"></div>
</div>

<div class="section">
<h2>Announcement</h2>
<div id="announcement"></div>
</div>

<div class="section">
<h2>Study Material</h2>
<div id="study"></div>
</div>

<div class="section">
<h2>Practical</h2>
<div id="practical"></div>
</div>

</div>

<script>

const PASS="apmarya81120252026chatt9476gcetts";

/* Admin login */
function adminLogin(){
let p=prompt("Enter admin password");
if(p===PASS){
document.getElementById("admin").style.display="block";
}else{
alert("Wrong password");
}
}

/* Load saved data */
window.onload=function(){
loadDP();
loadPosts();
}

/* Save DP */
function loadDP(){
let saved=localStorage.getItem("dpImage");
if(saved) document.getElementById("dp").src=saved;
}

document.getElementById("dpUpload").onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=e=>{
localStorage.setItem("dpImage",e.target.result);
document.getElementById("dp").src=e.target.result;
};
reader.readAsDataURL(file);
}

/* Upload content */
function upload(){
let section=document.getElementById("section").value;
let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

let reader=new FileReader();

if(file){
reader.onload=e=>{
savePost(section,text,e.target.result,file.type);
};
reader.readAsDataURL(file);
}else{
savePost(section,text,null,null);
}

document.getElementById("text").value="";
document.getElementById("file").value="";
}

/* Save post */
function savePost(section,text,fileData,type){

let posts=JSON.parse(localStorage.getItem("posts")||"[]");

posts.unshift({
section,
text,
file:fileData,
type
});

localStorage.setItem("posts",JSON.stringify(posts));
renderPosts();
}

/* Load posts */
function loadPosts(){
renderPosts();
}

/* Render posts */
function renderPosts(){

document.getElementById("notice").innerHTML="";
document.getElementById("announcement").innerHTML="";
document.getElementById("study").innerHTML="";
document.getElementById("practical").innerHTML="";

let posts=JSON.parse(localStorage.getItem("posts")||"[]");

posts.forEach((post,i)=>{

let card=document.createElement("div");
card.className="card";

if(post.text){
let p=document.createElement("p");
p.textContent=post.text;
card.appendChild(p);
}

if(post.file){
if(post.type.startsWith("image")){
let img=document.createElement("img");
img.src=post.file;
card.appendChild(img);
}else{
let link=document.createElement("a");
link.href=post.file;
link.target="_blank";
link.textContent="Open File";
card.appendChild(link);
}
}

let del=document.createElement("button");
del.textContent="Delete";
del.className="delete";
del.onclick=()=>deletePost(i);

card.appendChild(del);

document.getElementById(post.section).appendChild(card);

});

}

/* Delete post */
function deletePost(index){
let posts=JSON.parse(localStorage.getItem("posts"));
posts.splice(index,1);
localStorage.setItem("posts",JSON.stringify(posts));
renderPosts();
}

</script>

</body>
</html>
