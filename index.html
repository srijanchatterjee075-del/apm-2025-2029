<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM 2025-2029 | Secure Hub</title>
    <style>
        :root {
            --primary: #8a2be2;
            --accent: #ee82ee;
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        /* Top Navigation */
        header {
            background: var(--primary);
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .menu-dots {
            cursor: pointer;
            font-size: 30px;
            padding: 0 10px;
            line-height: 1;
        }

        /* Profile Display */
        #headerProfile {
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(to bottom, var(--primary), transparent);
        }

        #profilePic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg);
            object-fit: cover;
            background: #222;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Secret Admin Dashboard */
        #adminDashboard {
            display: none;
            background: #1a1a1a;
            margin: 20px;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(238, 130, 238, 0.2);
        }

        .admin-tool {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        /* Layout & Content */
        .section {
            max-width: 850px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card);
            border-radius: 12px;
            text-align: left;
        }

        h2 { color: var(--accent); font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; }

        input, select, button {
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: white;
        }

        button {
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: var(--accent); color: black; }

        .delete-btn { background: #d00; width: auto; padding: 5px 15px; font-size: 12px; }

        /* Chatbot */
        #chatbot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: #111;
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
        }

        #chatHeader { background: var(--primary); padding: 10px; font-weight: bold; font-size: 14px; }
        #chatMessages { height: 120px; overflow-y: auto; padding: 10px; font-size: 13px; border-bottom: 1px solid #222; }
        .chat-input-row { display: flex; padding: 5px; background: #000; }
        #chatInput { margin: 0; border-radius: 5px 0 0 5px; }
        #chatBtn { width: 60px; margin: 0; border-radius: 0 5px 5px 0; }

        .item-card { background: #222; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .content-img { max-width: 100%; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <span>APM 2025-2029</span>
    <div class="menu-dots" onclick="openAdmin()">⋮</div>
</header>

<div id="headerProfile">
    <img id="profilePic" src="https://via.placeholder.com/110" alt="Admin Pic">
</div>

<div id="adminDashboard">
    <h2 style="border:none; text-align:center">⚙️ ADMIN CONTROL PANEL</h2>
    
    <div class="admin-tool">
        <label>Update Main Profile Picture:</label>
        <input type="file" id="dpUpload" accept="image/*">
    </div>

    <div class="admin-tool">
        <label>Post New Content:</label>
        <select id="sectionSelect">
            <option value="notice">Important Notice</option>
            <option value="announcement">Announcement</option>
            <option value="study">Study Material</option>
            <option value="practical">Practical</option>
        </select>
        <input type="text" id="textInput" placeholder="Message or Title">
        <input type="file" id="fileInput">
        <button onclick="publish()">Publish to Portal</button>
    </div>

    <button onclick="document.getElementById('adminDashboard').style.display='none'" style="background:#333">Close & Lock</button>
</div>

<div class="section"><h2>📢 Important Notice</h2><div id="notice"></div></div>
<div class="section"><h2>📣 Announcement</h2><div id="announcement"></div></div>
<div class="section"><h2>📚 Study Material</h2><div id="study"></div></div>
<div class="section"><h2>🔬 Practical</h2><div id="practical"></div></div>

<div id="chatbot">
    <div id="chatHeader">🤖 Search Assistant</div>
    <div id="chatMessages"><div>How can I help you today?</div></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Google search...">
        <button id="chatBtn" onclick="googleSearch()">Go</button>
    </div>
</div>

<script>
const ACCESS_KEY = "apmarya81120252026chatt9476gcetts";

// 1. Admin Access
function openAdmin() {
    let ask = prompt("Enter Admin Password:");
    if (ask === ACCESS_KEY) {
        document.getElementById("adminDashboard").style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    } else {
        alert("Wrong Password. Access Denied.");
    }
}

// 2. Profile Pic Logic (Stored in LocalStorage)
window.onload = () => {
    const savedImg = localStorage.getItem("apm_admin_pic");
    if(savedImg) document.getElementById("profilePic").src = savedImg;
};

document.getElementById("dpUpload").addEventListener("change", function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        const data = e.target.result;
        document.getElementById("profilePic").src = data;
        localStorage.setItem("apm_admin_pic", data);
    };
    reader.readAsDataURL(this.files[0]);
});

// 3. Publishing Content
function publish() {
    const section = document.getElementById("sectionSelect").value;
    const text = document.getElementById("textInput").value;
    const file = document.getElementById("fileInput").files[0];
    const container = document.getElementById(section);

    const card = document.createElement("div");
    card.className = "item-card";

    if(text) {
        const p = document.createElement("p");
        p.textContent = text;
        p.style.margin = "0 0 10px 0";
        card.appendChild(p);
    }

    if(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = e.target.result;
                img.className = "content-img";
                card.appendChild(img);
            } else {
                const link = document.createElement("a");
                link.href = e.target.result;
                link.textContent = "📄 Document: " + file.name;
                link.style.color = "violet";
                link.target = "_blank";
                card.appendChild(link);
            }
        };
        reader.readAsDataURL(file);
    }

    const del = document.createElement("button");
    del.textContent = "Delete";
    del.className = "delete-btn";
    del.onclick = () => card.remove();
    
    card.appendChild(del);
    container.prepend(card);

    // Clear Inputs
    document.getElementById("textInput").value = "";
    document.getElementById("fileInput").value = "";
}

// 4. Chatbot Auto-Google Logic
function googleSearch() {
    const query = document.getElementById("chatInput").value;
    if(!query) return;

    const chat = document.getElementById("chatMessages");
    chat.innerHTML += `<div style="text-align:right; color:violet;"><b>You:</b> ${query}</div>`;
    chat.innerHTML += `<div style="color:lime;"><b>Bot:</b> Searching Google...</div>`;

    // Automatic redirect
    window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, "_blank");

    document.getElementById("chatInput").value = "";
    chat.scrollTop = chat.scrollHeight;
}

// Enter key support
document.getElementById("chatInput").onkeydown = (e) => { if(e.key === "Enter") googleSearch(); };

</script>

</body>
</html>
