<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM 2025-2029</title>

<style>
:root { 
    --primary: #8a2be2; 
    --accent: #ee82ee; 
    --bg: #0a0a0a; 
    --card: #1a1a1a; 
    --delete: #ff4444;
}

* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body { 
    margin: 0; 
    background: var(--bg); 
    color: white; 
    padding-bottom: 140px;
}

/* HEADER */
header { 
    background: var(--primary); 
    padding: 15px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    position: sticky; 
    top: 0; 
    z-index: 1000;
}

/* PROFILE */
#profileSection {
    display: flex;
    justify-content: center;
    padding: 25px 10px;
}

#profilePic { 
    width: 100px; 
    height: 100px; 
    border-radius: 50%; 
    border: 4px solid var(--primary); 
    object-fit: cover;
}

/* GRID */
.container { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
    gap: 15px; 
    padding: 10px; 
}

.section { 
    background: var(--card); 
    padding: 15px; 
    border-radius: 15px; 
    border-left: 4px solid var(--primary);
}

.section h4 { 
    margin-top: 0; 
    color: #ccc; 
}

/* INPUTS */
input, select, button { 
    width: 100%; 
    padding: 12px; 
    margin: 8px 0; 
    border-radius: 10px; 
    border: 1px solid #333; 
    background: #000; 
    color: white; 
    font-size: 16px; 
}

button { 
    background: var(--primary); 
    border: none; 
    cursor: pointer; 
}

button:active { opacity: 0.7; }

/* ADMIN */
#adminDashboard { 
    display: none; 
    background: #151515; 
    margin: 15px auto; 
    padding: 15px; 
    border-radius: 15px; 
    width: 95%;
}

/* CARDS */
.item-card { 
    background: #252525; 
    padding: 10px; 
    border-radius: 10px; 
    margin-top: 10px; 
}

.item-card img { 
    width: 100%; 
    border-radius: 8px; 
    margin-top: 8px; 
}

.del-btn { 
    background: var(--delete); 
    margin-top: 8px; 
}

/* SEARCH BAR */
#chatbot { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    right: 0; 
    background: #111; 
    padding: 10px;
    border-top: 2px solid var(--primary);
}

.chat-row { 
    display: flex; 
    gap: 8px; 
}

#chatIn { flex: 1; }

/* MOBILE FIX */
@media (max-width: 480px) {
    .container {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <strong>APM 2025-2029</strong>
    <div onclick="askPass()" style="font-size:22px; cursor:pointer;">⋮</div>
</header>

<div id="profileSection">
    <img id="profilePic" src="https://via.placeholder.com/100">
</div>

<div id="adminDashboard">
    <h3>Admin Panel</h3>

    <input type="file" id="dpUpload" accept="image/*">

    <select id="secSelect">
        <option value="notice">Notice</option>
        <option value="announcement">Announcement</option>
        <option value="study">Study</option>
        <option value="practical">Practical</option>
    </select>

    <input type="text" id="textIn" placeholder="Write something...">
    <input type="file" id="fileIn" accept="image/*">

    <button onclick="publish()">Post</button>
</div>

<div class="container">
    <div class="section"><h4>Notice</h4><div id="notice"></div></div>
    <div class="section"><h4>Announcement</h4><div id="announcement"></div></div>
    <div class="section"><h4>Study</h4><div id="study"></div></div>
    <div class="section"><h4>Practical</h4><div id="practical"></div></div>
</div>

<div id="chatbot">
    <div class="chat-row">
        <input type="text" id="chatIn" placeholder="Search Google...">
        <button onclick="doSearch()">Go</button>
    </div>
</div>

<script>
const PASS = "apmarya81120252026chatt9476gcetts";

window.onload = () => {
    const pic = localStorage.getItem("apm_p");
    if(pic) profilePic.src = pic;
    refreshUI();
};

function askPass() {
    if(prompt("Enter Password") === PASS) {
        adminDashboard.style.display = "block";
        refreshUI();
        window.scrollTo(0,0);
    } else alert("Wrong Password");
}

function refreshUI() {
    ["notice","announcement","study","practical"].forEach(s => {
        const data = JSON.parse(localStorage.getItem("apm_"+s)) || [];
        document.getElementById(s).innerHTML = "";
        data.forEach(i => render(s,i.t,i.f,i.id));
    });
}

dpUpload.onchange = function() {
    const reader = new FileReader();
    reader.onload = e => {
        profilePic.src = e.target.result;
        localStorage.setItem("apm_p", e.target.result);
    };
    reader.readAsDataURL(this.files[0]);
};

function publish() {
    const s = secSelect.value;
    const t = textIn.value;
    const f = fileIn.files[0];
    const id = Date.now();

    if(!t && !f) return alert("Add something");

    if(f){
        const r = new FileReader();
        r.onload = e => save(s,t,e.target.result,id);
        r.readAsDataURL(f);
    } else save(s,t,null,id);
}

function save(s,t,f,id){
    const data = JSON.parse(localStorage.getItem("apm_"+s)) || [];
    data.push({id,t,f});
    localStorage.setItem("apm_"+s, JSON.stringify(data));
    render(s,t,f,id);
    textIn.value = "";
    fileIn.value = "";
}

function render(s,t,f,id){
    const div = document.createElement("div");
    div.className = "item-card";
    div.innerHTML = `<p>${t}</p>${f ? `<img src="${f}">` : ""}`;

    if(adminDashboard.style.display === "block"){
        const btn = document.createElement("button");
        btn.innerText = "Delete";
        btn.className = "del-btn";
        btn.onclick = () => {
            div.remove();
            let data = JSON.parse(localStorage.getItem("apm_"+s));
            localStorage.setItem("apm_"+s, JSON.stringify(data.filter(i=>i.id!==id)));
        };
        div.appendChild(btn);
    }

    document.getElementById(s).prepend(div);
}

function doSearch(){
    const q = chatIn.value;
    if(q) window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}
</script>

</body>
</html>
