<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APM 2025-2029 | Universal Portal</title>
    <style>
        :root {
            --primary: #8a2be2;
            --accent: #ee82ee;
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* Responsive Header */
        header {
            background: var(--primary);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        .menu-dots {
            cursor: pointer;
            font-size: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Profile Area */
        #profileSection { text-align: center; padding: 30px 20px; }
        #profilePic {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        /* Admin Dashboard (Hidden) */
        #adminDashboard {
            display: none;
            background: var(--card);
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Main Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 5%;
        }

        .section {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border-top: 4px solid var(--primary);
        }

        h2 { color: var(--accent); font-size: 1.1rem; margin-top: 0; display: flex; align-items: center; gap: 8px; }

        /* Forms & Buttons */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .delete-btn { background: #ff4444; width: auto; padding: 6px 15px; font-size: 12px; margin-top: 10px; }

        /* Item Cards */
        .item-card {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .item-card img { max-width: 100%; border-radius: 5px; margin-top: 10px; }
        .item-card a { color: cyan; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* Mobile Chatbot */
        #chatbot {
            position: fixed; bottom: 20px; right: 20px; width: 280px;
            background: #111; border: 2px solid var(--primary); border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 999;
        }
        #chatHeader { background: var(--primary); padding: 10px; font-weight: bold; font-size: 14px; }
        #chatMessages { height: 150px; overflow-y: auto; padding: 10px; font-size: 13px; text-align: left; background: #000; }
        .chat-input-row { display: flex; padding: 5px; }
        #chatInput { margin: 0; border-radius: 8px 0 0 8px; }
        #chatGo { width: 60px; margin: 0; border-radius: 0 8px 8px 0; }

        @media (max-width: 480px) {
            header h1 { font-size: 1rem; }
            #profilePic { width: 90px; height: 90px; }
            #chatbot { width: calc(100% - 40px); left: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>APM 2025-2029</h1>
    <div class="menu-dots" onclick="accessAdmin()">⋮</div>
</header>

<div id="profileSection">
    <img id="profilePic" src="https://via.placeholder.com/120" alt="Admin Pic">
</div>

<div id="adminDashboard">
    <h3 style="margin-top:0">🛠️ Admin Portal</h3>
    <label>Change Profile Picture:</label>
    <input type="file" id="dpUpload" accept="image/*">
    
    <label>Post to Section:</label>
    <select id="sectionSelect">
        <option value="notice">Important Notice</option>
        <option value="announcement">Announcement</option>
        <option value="study">Study Material</option>
        <option value="practical">Practical</option>
    </select>
    <input type="text" id="textInput" placeholder="Write text or title...">
    <input type="file" id="fileInput">
    <button onclick="publish()">Update Webpage</button>
    <button onclick="document.getElementById('adminDashboard').style.display='none'" style="background:#444">Lock Dashboard</button>
</div>

<div class="container">
    <div class="section"><h2>📢 Important Notice</h2><div id="notice"></div></div>
    <div class="section"><h2>📣 Announcement</h2><div id="announcement"></div></div>
    <div class="section"><h2>📚 Study Material</h2><div id="study"></div></div>
    <div class="section"><h2>🔬 Practical</h2><div id="practical"></div></div>
</div>

<div id="chatbot">
    <div id="chatHeader">🤖 Search Assistant</div>
    <div id="chatMessages"><div>Search anything on Google...</div></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Ask...">
        <button id="chatGo" onclick="googleSearch()">Go</button>
    </div>
</div>

// --- LOAD SAVED DATA ---
window.onload = () => {
    const savedPic = localStorage.getItem("apm_v3_pic");
    if(savedPic) document.getElementById("profilePic").src = savedPic;

    ['notice', 'announcement', 'study', 'practical'].forEach(sec => {
        const savedData = JSON.parse(localStorage.getItem(`apm_v3_${sec}`)) || [];
        savedData.forEach(item => renderItem(sec, item.text, item.file, item.id));
    });
};

// --- ADMIN ACCESS ---
function accessAdmin() {
    if (prompt("Admin Password:") === KEY) {
        document.getElementById("adminDashboard").style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    } else {
        alert("Access Denied");
    }
}

// --- PROFILE UPDATE ---
document.getElementById("dpUpload").onchange = function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById("profilePic").src = e.target.result;
        localStorage.setItem("apm_v3_pic", e.target.result);
    };
    reader.readAsDataURL(this.files[0]);
};

// --- PUBLISH LOGIC ---
function publish() {
    const sec = document.getElementById("sectionSelect").value;
    const text = document.getElementById("textInput").value;
    const fileInput = document.getElementById("fileInput").files[0];
    const id = Date.now();

    if(!text && !fileInput) return alert("Please add text or a file");

    if (fileInput) {
        const reader = new FileReader();
        reader.onload = (e) => {
            saveAndRender(sec, text, e.target.result, id);
        };
        reader.readAsDataURL(fileInput);
    } else {
        saveAndRender(sec, text, null, id);
    }
}

    // Save to Storage
    const data = JSON.parse(localStorage.getItem(`apm_v3_${sec}`)) || [];
    data.push({ id, text, file: fileData });
    localStorage.setItem(`apm_v3_${sec}`, JSON.stringify(data));

    // Update UI
    renderItem(sec, text, fileData, id);
    
    // Reset
    document.getElementById("textInput").value = "";
    document.getElementById("fileInput").value = "";
}
