<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM 2025-2029 | Secure Portal</title>
    <style>
        :root {
            --primary: #8a2be2;
            --accent: #ee82ee;
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Header & Menu */
        header {
            background: var(--primary);
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-dots {
            cursor: pointer;
            font-size: 28px;
            padding: 0 10px;
            transition: 0.3s;
        }

        .menu-dots:hover { color: var(--bg); }

        /* Profile Box */
        #profileArea {
            text-align: center;
            padding: 20px;
        }

        #profilePic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            background: #222;
        }

        /* Admin Dashboard (Hidden by Default) */
        #adminDashboard {
            display: none; /* Controlled by JS */
            background: #222;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
        }

        /* UI Elements */
        .section {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card);
            border-radius: 10px;
        }

        h2 { color: var(--accent); border-bottom: 1px solid #333; }

        input, select, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #111;
            color: white;
        }

        button {
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: var(--accent); }

        .delete-btn { background: #ff4444; font-size: 12px; margin-top: 5px; }

        /* Chatbot */
        #chatbot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: #111;
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,1);
        }

        #chatHeader { background: var(--primary); padding: 10px; font-weight: bold; }
        #chatMessages { height: 150px; overflow-y: auto; padding: 10px; font-size: 14px; text-align: left;}
        .chat-input-area { display: flex; padding: 5px; }
        #chatInput { flex: 1; }

        img.content-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <span>APM 2025-2029</span>
    <div class="menu-dots" onclick="toggleAdmin()">⋮</div>
</header>

<div id="profileArea">
    <img id="profilePic" src="https://via.placeholder.com/100" alt="Profile">
    <br>
    <input type="file" id="dpUpload" accept="image/*" style="display:none">
    <button onclick="document.getElementById('dpUpload').click()">Update Photo</button>
</div>

<div id="adminDashboard" class="section">
    <h2 style="margin-top:0">🛠️ Admin Upload</h2>
    <select id="sectionSelect">
        <option value="notice">Important Notice</option>
        <option value="announcement">Announcement</option>
        <option value="study">Study Material</option>
        <option value="practical">Practical</option>
    </select>
    <br>
    <input type="text" id="textInput" placeholder="Write something..." style="width:80%">
    <br>
    <input type="file" id="fileInput">
    <br>
    <button onclick="upload()">Post to Portal</button>
    <button onclick="closeAdmin()" style="background:#444">Lock Dashboard</button>
</div>

<div class="section"><h2>📢 Important Notice</h2><div id="notice"></div></div>
<div class="section"><h2>📣 Announcement</h2><div id="announcement"></div></div>
<div class="section"><h2>📚 Study Material</h2><div id="study"></div></div>
<div class="section"><h2>🔬 Practical</h2><div id="practical"></div></div>

<div id="chatbot">
    <div id="chatHeader">🤖 APM Bot (Search)</div>
    <div id="chatMessages"><div style="color:#888">Ask me anything, I'll find it on Google!</div></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Ask...">
        <button onclick="ask()">Go</button>
    </div>
</div>

<script>
const PASS = "apmarya81120252026chatt9476gcetts";

// 1. Admin Toggle Logic
function toggleAdmin() {
    let check = prompt("Enter Admin Password to unlock dashboard:");
    if (check === PASS) {
        document.getElementById("adminDashboard").style.display = "block";
        window.scrollTo(0, 0);
    } else {
        alert("Access Denied!");
    }
}

function closeAdmin() {
    document.getElementById("adminDashboard").style.display = "none";
}

// 2. Persistent Profile Pic
window.onload = () => {
    const saved = localStorage.getItem("apm_dp");
    if(saved) document.getElementById("profilePic").src = saved;
};

document.getElementById("dpUpload").addEventListener("change", function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById("profilePic").src = e.target.result;
        localStorage.setItem("apm_dp", e.target.result);
    };
    reader.readAsDataURL(this.files[0]);
});

// 3. Upload Logic
function upload() {
    const section = document.getElementById("sectionSelect").value;
    const text = document.getElementById("textInput").value;
    const file = document.getElementById("fileInput").files[0];
    const container = document.getElementById(section);

    const card = document.createElement("div");
    card.style.background = "#252525";
    card.style.padding = "10px";
    card.style.margin = "10px 0";
    card.style.borderRadius = "8px";

    if(text) {
        const p = document.createElement("p");
        p.textContent = text;
        card.appendChild(p);
    }

    if(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = e.target.result;
                img.className = "content-img";
                card.appendChild(img);
            } else {
                const a = document.createElement("a");
                a.href = e.target.result;
                a.textContent = "📄 View Document: " + file.name;
                a.style.color = "cyan";
                a.target = "_blank";
                card.appendChild(a);
            }
        };
        reader.readAsDataURL(file);
    }

    const del = document.createElement("button");
    del.textContent = "Delete Item";
    del.className = "delete-btn";
    del.onclick = () => card.remove();
    
    card.appendChild(document.createElement("br"));
    card.appendChild(del);
    container.prepend(card);
    
    // Clear
    document.getElementById("textInput").value = "";
    document.getElementById("fileInput").value = "";
}

// 4. Automatic Google Chatbot
function ask() {
    const q = document.getElementById("chatInput").value;
    if(!q) return;

    const chat = document.getElementById("chatMessages");
    chat.innerHTML += `<div><b>You:</b> ${q}</div>`;
    chat.innerHTML += `<div style="color:var(--accent)"><b>Bot:</b> Opening Google...</div>`;

    // Opens Google automatically in a new tab
    window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, "_blank");

    document.getElementById("chatInput").value = "";
    chat.scrollTop = chat.scrollHeight;
}

// Enter key support for chat
document.getElementById("chatInput").onkeydown = (e) => { if(e.key === "Enter") ask(); };

</script>

</body>
</html>
