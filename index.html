<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0f;color:white;}
header{text-align:center;padding:15px;font-size:28px;font-weight:bold;}
header span{color:violet;}
.container{max-width:900px;margin:auto;padding:10px;}

.section{background:#111;margin:10px 0;padding:15px;border-radius:12px;}
.section h3{color:violet;margin:0 0 5px;}

.clock{font-size:28px;text-align:center;background:#111;padding:12px;border-radius:10px;animation:glow 1.5s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 8px violet;}to{box-shadow:0 0 20px violet;}}

.notes{position:fixed;left:10px;top:50%;transform:translateY(-50%);width:240px;background:#111;padding:10px;border-radius:12px;}
.notes input,.notes textarea,.notes button{width:100%;margin-top:6px;padding:6px;border-radius:6px;border:none;}
.notes input,.notes textarea{background:#000;color:white;border:1px solid #333;}
.notes button{background:violet;color:black;font-weight:bold;cursor:pointer;}
.note-item{background:#000;margin-top:6px;padding:6px;border-radius:6px;font-size:13px;}
.note-item a{color:violet;display:block;margin-top:4px;}

.todo{background:#111;margin-top:15px;padding:12px;border-radius:12px;position:relative;}
.todo input,.todo button{width:100%;margin-top:6px;padding:6px;border-radius:6px;border:none;}
.todo input{background:#000;color:white;border:1px solid #333;}
.todo button{background:violet;color:black;font-weight:bold;cursor:pointer;}
.todo-item{background:#000;margin-top:8px;padding:8px;border-radius:6px;}
.completed{text-decoration:line-through;opacity:0.4;}

.progress{margin-top:8px;font-size:14px;color:#ccc;}
.progress-bar{width:100%;height:10px;background:#222;border-radius:10px;margin-top:5px;overflow:hidden;}
.progress-fill{height:100%;background:violet;width:0%;transition:0.3s;}

.circle{position:absolute;right:-20px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;animation:float 2s infinite;}
@keyframes float{0%{transform:translateY(-50%);}50%{transform:translateY(-60%);}100%{transform:translateY(-50%);}}
.red{background:red;box-shadow:0 0 10px red;}
.orange{background:orange;box-shadow:0 0 10px orange;}
.green{background:lime;box-shadow:0 0 10px lime;}
.blue{background:cyan;box-shadow:0 0 10px cyan;}

.reminder{position:fixed;right:10px;top:50%;color:yellow;display:none;animation:float 2s infinite;}

.chatbot{position:fixed;bottom:10px;left:10px;width:260px;background:#111;padding:10px;border-radius:10px;}
.chatbot input{width:100%;padding:5px;background:#000;color:white;border:1px solid #333;}
.chat-output{margin-top:8px;font-size:13px;white-space:pre-line;}
</style>
</head>
<body>

<header>BTECH <span>25 29</span></header>

<div class="notes">
<b>Notes</b>
<textarea id="noteText" placeholder="Write note..."></textarea>
<input id="noteLink" placeholder="Add link (optional)">
<button onclick="addNote()">Save</button>
<div id="noteList"></div>
</div>

<div class="container">

<div class="clock" id="clock"></div>

<div class="section"><h3>Notice</h3><p>NO UPDATE</p></div>
<div class="section"><h3>Books</h3><p>NO UPDATE</p></div>
<div class="section"><h3>Practical</h3><p>NO UPDATE</p></div>

<div class="todo">
<div id="circle" class="circle"></div>
<b>Todo List</b>
<input id="task" placeholder="Enter task">
<input type="datetime-local" id="date">
<button onclick="addTask()">Add</button>
<div class="progress" id="progress"></div>
<div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
<div id="list"></div>
</div>

</div>

<div id="reminder" class="reminder">Stay focused ✨</div>

<div class="chatbot">
🤖 Chat
<input id="chat" onkeydown="chatbot(event)" placeholder="Ask something...">
<div id="out" class="chat-output"></div>
</div>

<script>
// CLOCK
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

// NOTES
let notes=JSON.parse(localStorage.getItem("notes"))||[];
function saveNotes(){localStorage.setItem("notes",JSON.stringify(notes));}
function addNote(){
let t=noteText.value;
let l=noteLink.value;
if(!t)return;
notes.push({t,l});
saveNotes();renderNotes();
noteText.value="";noteLink.value="";
}
function delNote(i){notes.splice(i,1);saveNotes();renderNotes();}
function renderNotes(){
let box=document.getElementById("noteList");
box.innerHTML="";
notes.forEach((n,i)=>{
let div=document.createElement("div");
div.className="note-item";
div.innerHTML=`• ${n.t} ${n.l?`<a href='${n.l}' target='_blank'>Link</a>`:""} <button onclick='delNote(${i})'>X</button>`;
box.appendChild(div);
});
}
renderNotes();

// TODO
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
function save(){localStorage.setItem("tasks",JSON.stringify(tasks));}
function addTask(){
let t=task.value;
let d=date.value;
if(!t||!d)return;
tasks.push({t,d,done:false});
save();render();
}
function toggle(i){tasks[i].done=!tasks[i].done;save();render();}
function del(i){tasks.splice(i,1);save();render();}

function render(){
let list=document.getElementById("list");
list.innerHTML="";
let done=tasks.filter(x=>x.done).length;
let total=tasks.length;
let percent= total? Math.round(done/total*100):0;

document.getElementById("progress").innerText=`${done}/${total} → ${percent}%`;
document.getElementById("bar").style.width=percent+"%";

let showReminder=false;

tasks.forEach((x,i)=>{
let dl=new Date(x.d);
let now=new Date();
let diff=(dl-now)/86400000;
if(diff<=3 && !x.done) showReminder=true;

let div=document.createElement("div");
div.className="todo-item";
div.innerHTML=`
<input type='checkbox' ${x.done?"checked":""} onclick='toggle(${i})'>
<span class='${x.done?"completed":""}'>${x.t}</span>
<button onclick='del(${i})'>X</button>
<div>📅 ${dl.toLocaleString()}</div>`;
list.appendChild(div);
});

document.getElementById("reminder").style.display=showReminder?"block":"none";
}
render();

// CHATBOT
let ask=false;
function chatbot(e){
if(e.key==='Enter'){
let msg=e.target.value.toLowerCase().trim();
let out=document.getElementById("out");

if(msg.match(/\b(hi|hello|hey|hii|helo)\b/)){
out.innerText="Hello 👋 How can I help you?";
}
else if(msg.match(/\b(i am|i'm|im|i )\b/)){
out.innerText="I am a chatbot 🤖, nice to meet you!";
}
else if(msg.includes("task")||msg.includes("work")){
out.innerText="Do you want to see your tasks?";
ask=true;
}
else if(ask && msg.includes("yes")){
let p=tasks.filter(x=>!x.done).map(x=>x.t).join("\n");
out.innerText=p||"No pending tasks 🎉";
ask=false;
}
else if(msg.includes("show")){
out.innerText=tasks.map(x=>x.t).join("\n")||"No tasks";
}
else{
out.innerText="Searching...";
setTimeout(()=>{
window.open("https://www.google.com/search?q="+encodeURIComponent(msg));
},700);
}

e.target.value="";
}
}
</script>

</body>
</html>
