<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0f;color:white;}
header{text-align:center;padding:15px;font-size:26px;font-weight:bold;}
header span{color:violet;}
.container{max-width:900px;margin:auto;padding:10px;}

.section{background:#111;margin:10px 0;padding:15px;border-radius:12px;}
.section h3{color:violet;margin:0 0 5px;}

.clock{text-align:center;background:#111;padding:12px;border-radius:10px;animation:glow 1.5s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 8px violet;}to{box-shadow:0 0 20px violet;}}

/* NOTES */
.notes{position:fixed;left:10px;top:10px;width:230px;background:#111;padding:10px;border-radius:12px;max-height:90vh;overflow:auto;}
.notes textarea,.notes button{width:100%;margin-top:6px;padding:6px;border-radius:6px;border:none;}
.notes textarea{background:#000;color:white;border:1px solid #333;}
.notes button{background:violet;color:black;font-weight:bold;}
.note-item{background:#000;margin-top:6px;padding:6px;border-radius:6px;font-size:13px;}

/* TODO */
.todo{background:#111;margin-top:15px;padding:12px;border-radius:12px;position:relative;}
.todo input,.todo button{width:100%;margin-top:6px;padding:6px;border-radius:6px;border:none;}
.todo input{background:#000;color:white;border:1px solid #333;}
.todo button{background:violet;color:black;font-weight:bold;}
.todo-item{background:#000;margin-top:8px;padding:8px;border-radius:6px;}
.completed{text-decoration:line-through;opacity:0.4;}

.circle-wrap{position:absolute;right:-20px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:5px;}
.circle{width:18px;height:18px;border-radius:50%;animation:float 2s infinite;}
.circle-text{font-size:12px;color:#ccc;}

@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-6px);}100%{transform:translateY(0);}}
.red{background:red;box-shadow:0 0 10px red;}
.orange{background:orange;box-shadow:0 0 10px orange;}
.green{background:lime;box-shadow:0 0 10px lime;}
.blue{background:cyan;box-shadow:0 0 10px cyan;}

.progress-bar{width:100%;height:10px;background:#222;border-radius:10px;margin-top:5px;}
.progress-fill{height:100%;background:violet;width:0%;}

/* CHATBOT */
.bot-btn{
position:fixed;bottom:10px;left:10px;
width:50px;height:50px;border-radius:50%;
background:#111;display:flex;align-items:center;justify-content:center;
cursor:pointer;font-size:22px;
}

.chatbox{
position:fixed;bottom:70px;left:10px;width:260px;
background:#111;padding:10px;border-radius:10px;
display:none;
}

.chatbox input{width:100%;padding:6px;}

@media(max-width:768px){
.notes{position:static;width:100%;}
.chatbox{width:90%;left:5%;}
}
</style>
</head>

<body>

<header>BTECH <span>25 29</span></header>

<div class="container">

<div class="notes">
<b>Notes</b>
<textarea id="noteText"></textarea>
<button onclick="addNote()">Save</button>
<div id="noteList"></div>
</div>

<div class="clock" id="clock"></div>

<div class="section"><h3>Notice</h3><p>NO UPDATE</p></div>

<div class="todo">
<div class="circle-wrap">
<div id="circle" class="circle"></div>
<span id="circleText" class="circle-text">(0%)</span>
</div>

<b>Todo List</b>
<input id="task">
<input type="datetime-local" id="date">
<button onclick="addTask()">Add</button>

<div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
<div id="list"></div>
</div>

</div>

<!-- BOT BUTTON -->
<div class="bot-btn" onclick="toggleBot()">🤖</div>

<!-- CHATBOX -->
<div class="chatbox" id="chatbox">
<input id="chat" onkeydown="chatbot(event)">
<div id="out"></div>
</div>

<script>
// CLOCK
setInterval(()=>{
clock.innerText=new Date().toLocaleString("en-IN");
},1000);

// NOTES
let notes=JSON.parse(localStorage.getItem("notes"))||[];
function saveNotes(){localStorage.setItem("notes",JSON.stringify(notes));}

function addNote(){
if(!noteText.value)return;
notes.push({t:noteText.value});
saveNotes();renderNotes();
noteText.value="";
}
function renderNotes(){
noteList.innerHTML="";
notes.forEach((n,i)=>{
noteList.innerHTML+=`<div class="note-item">${n.t}<button onclick="delNote(${i})">X</button></div>`;
});
}
function delNote(i){notes.splice(i,1);saveNotes();renderNotes();}
renderNotes();

// TODO
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
function save(){localStorage.setItem("tasks",JSON.stringify(tasks));}

function addTask(){
if(!task.value||!date.value)return;
tasks.push({t:task.value,d:date.value,done:false});
save();render();
}

function toggle(i){tasks[i].done=!tasks[i].done;save();render();}
function del(i){tasks.splice(i,1);save();render();}

function render(){
list.innerHTML="";
let done=tasks.filter(x=>x.done).length;
let total=tasks.length;
let percent= total?Math.round(done/total*100):0;

bar.style.width=percent+"%";
circleText.innerText="("+percent+"%)";

circle.className="circle";
let r= total?((total-done)/total)*100:0;
if(r>66)circle.classList.add("red");
else if(r>33)circle.classList.add("orange");
else if(r>0)circle.classList.add("green");
else circle.classList.add("blue");

let remind=false;

tasks.forEach((x,i)=>{
let dl=new Date(x.d);
if((dl-new Date())/86400000<=3 && !x.done) remind=true;

list.innerHTML+=`
<div class="todo-item">
<input type="checkbox" ${x.done?"checked":""} onclick="toggle(${i})">
<span class="${x.done?"completed":""}">${x.t}</span>
<button onclick="del(${i})">X</button>
</div>`;
});

if(remind){
botSpeak("Work is remaining ⚠️ Stay focused!");
setTimeout(()=>window.open("https://www.google.com"),1500);
}
}
render();

// CHATBOT CONFIG (REPLACEABLE)
const BOT_NAME="CRS BOT";
const BOT_REPLY="For more contact to CRS";

// CHAT TOGGLE
function toggleBot(){
chatbox.style.display = chatbox.style.display==="block"?"none":"block";
}

// CHATBOT
function chatbot(e){
if(e.key==='Enter'){
let msg=e.target.value.toLowerCase();

if(msg.includes("hi")||msg.includes("hello")||msg.includes("hey")){
out.innerText="Hello 👋";
}
else if(msg.includes("i am")||msg.includes("im")){
out.innerText="I am "+BOT_NAME+" 🤖";
}
else{
out.innerText="Searching...";
setTimeout(()=>{
window.open("https://www.google.com/search?q="+msg);
out.innerText=BOT_REPLY;
},800);
}

e.target.value="";
}
}

// BOT SPEAK
function botSpeak(text){
chatbox.style.display="block";
out.innerText=text;
}
</script>

</body>
</html>
