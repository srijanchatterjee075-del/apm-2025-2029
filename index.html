<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM 2025-2029</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:violet;
padding:15px;
font-size:28px;
font-weight:bold;
}

.section{
margin:20px;
padding:15px;
border:1px solid violet;
border-radius:10px;
}

#profileBox{
position:fixed;
top:15px;
right:15px;
}

#profilePic{
width:80px;
height:80px;
border-radius:50%;
border:3px solid violet;
object-fit:cover;
background:black;
}

button{
margin:5px;
padding:6px 12px;
cursor:pointer;
}

/* Chatbot */
#chatbot{
position:fixed;
bottom:20px;
right:20px;
width:270px;
background:#111;
border:1px solid violet;
border-radius:10px;
}

#chatHeader{
background:violet;
padding:8px;
font-weight:bold;
}

#chatMessages{
height:200px;
overflow:auto;
padding:10px;
font-size:14px;
text-align:left;
}

#chatInput{
width:75%;
}
</style>
</head>

<body>

<header>APM 2025-2029</header>

<!-- Profile Picture -->
<div id="profileBox">
<img id="profilePic">
<br>
<input type="file" id="dpUpload" accept="image/*">
</div>

<!-- Admin Upload -->
<div class="section">
<h2>Admin Upload</h2>

<input type="password" id="pass" placeholder="Enter Password">
<br><br>

<select id="sectionSelect">
<option value="notice">Important Notice</option>
<option value="announcement">Announcement</option>
<option value="study">Study Material</option>
<option value="practical">Practical</option>
</select>

<br><br>

<input type="text" id="textInput" placeholder="Write text">
<br><br>
<input type="file" id="fileInput">
<br><br>

<button onclick="upload()">Upload</button>
</div>

<!-- Sections -->
<div class="section">
<h2>Important Notice</h2>
<div id="notice"></div>
</div>

<div class="section">
<h2>Announcement</h2>
<div id="announcement"></div>
</div>

<div class="section">
<h2>Study Material</h2>
<div id="study"></div>
</div>

<div class="section">
<h2>Practical</h2>
<div id="practical"></div>
</div>

<!-- Chatbot -->
<div id="chatbot">
<div id="chatHeader">🤖 Study Chatbot</div>
<div id="chatMessages"></div>
<input id="chatInput">
<button onclick="ask()">Send</button>
</div>

<script>

const password="apmarya81120252026chatt9476gcetts";

/* Upload System */
function upload(){

let pass=document.getElementById("pass").value;
if(pass!==password){
alert("Wrong password");
return;
}

let section=document.getElementById("sectionSelect").value;
let text=document.getElementById("textInput").value;
let file=document.getElementById("fileInput").files[0];

if(text){
let p=document.createElement("p");
p.textContent=text;

let del=document.createElement("button");
del.textContent="Delete";
del.onclick=function(){
p.remove();
del.remove();
};

document.getElementById(section).appendChild(p);
document.getElementById(section).appendChild(del);
}

if(file){
let reader=new FileReader();

reader.onload=function(e){

if(file.type.startsWith("image")){
let img=document.createElement("img");
img.src=e.target.result;
img.width=200;

let del=document.createElement("button");
del.textContent="Delete";
del.onclick=function(){
img.remove();
del.remove();
};

document.getElementById(section).appendChild(img);
document.getElementById(section).appendChild(del);
}

else if(file.type==="application/pdf"){
let a=document.createElement("a");
a.href=e.target.result;
a.target="_blank";
a.textContent="Open PDF";

let del=document.createElement("button");
del.textContent="Delete";
del.onclick=function(){
a.remove();
del.remove();
};

document.getElementById(section).appendChild(a);
document.getElementById(section).appendChild(del);
}

};

reader.readAsDataURL(file);
}

}

/* DP Upload */
document.getElementById("dpUpload").addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){
document.getElementById("profilePic").src=e.target.result;
}
reader.readAsDataURL(file);
}
});

/* Chatbot Logic */

function ask(){

let input=document.getElementById("chatInput").value.toLowerCase();
let chat=document.getElementById("chatMessages");

let userMsg=document.createElement("div");
userMsg.textContent="You: "+input;
chat.appendChild(userMsg);

let reply=document.createElement("div");

let greetings=["hi","hello","hey","thanks","thank you"];

let studyWords=[
"study","exam","physics","math","engineering",
"formula","electrical","notes","question","problem"
];

let isGreeting=greetings.some(word => input.includes(word));
let isStudy=studyWords.some(word => input.includes(word));

if(isGreeting){
reply.textContent="Hello 👋";
}

else if(isStudy){
reply.textContent="Searching answer on Google...";
window.open("https://www.google.com/search?q="+input);
}

else{
reply.textContent="Sorry I can't answer.";
}

chat.appendChild(reply);
chat.scrollTop=chat.scrollHeight;

document.getElementById("chatInput").value="";
}

</script>

</body>
</html>
