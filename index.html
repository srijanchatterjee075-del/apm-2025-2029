<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
}

header {
  text-align:center;
  padding:15px;
  font-size:24px;
  font-weight:bold;
}

header span {
  color:violet;
}

#dp {
  display:block;
  margin:10px auto;
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}

.container {
  padding:10px;
}

.section {
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.chatbot {
  position:fixed;
  bottom:10px;
  left:10px;
  width:250px;
  background:#111;
  border-radius:10px;
  padding:10px;
}

.chatbot input {
  width:100%;
  padding:5px;
}

.admin {
  display:none;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:15px;
  border-radius:10px;
}

button {
  margin-top:5px;
}
</style>
</head>

<body>

<header id="title">BTECH <span>25 29</span></header>

<!-- ✅ Eagle DP added -->
<img id="dp" src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg">

<div class="container" id="content"></div>

<div class="chatbot">
  🤖<br>
  <input id="chatInput" placeholder="Type message..." onkeydown="chat(event)">
  <div id="chatOutput"></div>
</div>

<div class="admin" id="adminPanel">
  <h3>Admin Panel</h3>
  <input id="adminPass" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <div id="adminContent" style="display:none;">
    <textarea id="text" placeholder="Text"></textarea>
    <input id="link" placeholder="Link">
    <select id="section">
      <option>Notice</option>
      <option>Books</option>
      <option>Practical</option>
      <option>Important Notes</option>
    </select>
    <input type="file" id="dpUpload">
    <button onclick="upload()">Upload & Lock</button>
  </div>
</div>

<script>

// ✅ Default data (Important Notes text added)
let data = JSON.parse(localStorage.getItem("data")) || {
  Notice:[],
  Books:[],
  Practical:[],
  "Important Notes":[
    {text:"ghgdhdejeh", link:""}
  ]
};

function render(){
  let html="";
  for(let key in data){
    html += `<div class='section'><h3>${key}</h3>`;

    data[key].forEach(d=>{
      html += `<p>${d.text}</p>`;
      if(d.link){
        html += `<a href='${d.link}' target='_blank'>Open Link</a>`;
      }
    });

    html += `</div>`;
  }

  document.getElementById("content").innerHTML = html;
}

render();

// 🔐 Admin open (10 clicks)
let clicks=0;
document.getElementById("title").onclick=function(){
  clicks++;
  if(clicks>=10){
    document.getElementById("adminPanel").style.display="block";
  }
};

// 🔐 Login
function login(){
  let pass=document.getElementById("adminPass").value;
  if(pass==="arya9476apm2529"){
    document.getElementById("adminContent").style.display="block";
  }
}

// ➕ Upload
function upload(){
  let text=document.getElementById("text").value;
  let link=document.getElementById("link").value;
  let section=document.getElementById("section").value;

  if(text==="") return;

  data[section].unshift({text,link});
  localStorage.setItem("data",JSON.stringify(data));

  // DP upload
  let file=document.getElementById("dpUpload").files[0];
  if(file){
    let reader=new FileReader();
    reader.onload=function(e){
      localStorage.setItem("dp",e.target.result);
      document.getElementById("dp").src=e.target.result;
    }
    reader.readAsDataURL(file);
  }

  render();
}

// Load saved DP
let savedDP=localStorage.getItem("dp");
if(savedDP) document.getElementById("dp").src=savedDP;

// 🤖 Chatbot
function chat(e){
  if(e.key==='Enter'){
    let msg=e.target.value.toLowerCase();
    let out=document.getElementById("chatOutput");

    if(msg.includes("hi")||msg.includes("hello")||msg.includes("hey")||msg.includes("whatsup")){
      out.innerHTML="Hi I am APM chatbot, how can I help you?";
    } else {
      window.open("https://www.google.com/search?q="+msg);
      out.innerHTML="For more contact CRS...";
    }

    e.target.value="";
  }
}

</script>

</body>
</html>
