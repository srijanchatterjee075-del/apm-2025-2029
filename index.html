<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APM Portal | Admin Pro</title>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161616; --red: #ff3131; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }

        /* Header & Profile */
        header { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #profileArea { text-align: center; padding: 20px; }
        #dp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; background: #222; }

        /* Admin Panel */
        #adminPanel { display: none; background: #1a1a1a; margin: 15px; padding: 15px; border: 2px dashed var(--primary); border-radius: 12px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; font-size: 16px; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; border: none; }

        /* Content Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; border-top: 3px solid var(--primary); min-height: 150px; }
        .section h4 { margin: 0 0 15px 0; color: var(--primary); text-transform: uppercase; font-size: 14px; }

        /* Item Styling */
        .item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; border: 1px solid #333; }
        .new-tag { color: var(--red); font-weight: bold; font-size: 12px; margin-left: 8px; text-transform: uppercase; }
        .item a { color: #00d4ff; text-decoration: none; word-break: break-all; display: block; margin-top: 5px; font-size: 14px; }
        .del-btn { background: var(--red); width: auto; padding: 4px 10px; font-size: 11px; margin-top: 8px; }

        /* Fixed Search Box */
        #searchBox { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 2px solid var(--primary); }
        .search-flex { display: flex; gap: 8px; max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<header>
    <strong>APM PORTAL 2026</strong>
    <div onclick="checkAdmin()" style="cursor:pointer; font-size: 20px;">⚙️</div>
</header>

<div id="profileArea">
    <img id="dp" src="https://via.placeholder.com/100">
</div>

<div id="adminPanel">
    <h3 style="margin-top:0">🛠 Admin Tools</h3>
    <label>Change Profile Picture:</label>
    <input type="file" id="dpFile" accept="image/*">
    <hr style="border:0.5px solid #333; margin:15px 0;">
    <select id="sec">
        <option value="notices">Important Notice</option>
        <option value="announcements">Announcement</option>
        <option value="study">Study Material</option>
        <option value="practicals">Practical</option>
    </select>
    <input type="text" id="txt" placeholder="Enter Title/Text">
    <input type="url" id="link" placeholder="Paste Link (URL) here">
    <button onclick="upload()">Upload to Website</button>
</div>

<div class="container">
    <div class="section"><h4>Important Notice</h4><div id="notices"></div></div>
    <div class="section"><h4>Announcement</h4><div id="announcements"></div></div>
    <div class="section"><h4>Study Material</h4><div id="study"></div></div>
    <div class="section"><h4>Practical</h4><div id="practicals"></div></div>
</div>

<div id="searchBox">
    <form class="search-flex" action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" placeholder="Search Google..." required style="margin:0; flex:1;">
        <button type="submit" style="width:70px; margin:0;">Search</button>
    </form>
</div>

<script>
const KEY = "apmarya81120252026chatt9476gcetts";
let isAdmin = false;

window.onload = () => {
    const savedDp = localStorage.getItem('apm_dp');
    if(savedDp) document.getElementById('dp').src = savedDp;
    loadContent();
};

function checkAdmin() {
    if(prompt("Admin Password:") === KEY) {
        isAdmin = true;
        document.getElementById('adminPanel').style.display = 'block';
        loadContent(); // Refresh to show delete buttons
    }
}

// Handle DP Upload
document.getElementById('dpFile').onchange = function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        localStorage.setItem('apm_dp', e.target.result);
        document.getElementById('dp').src = e.target.result;
    };
    reader.readAsDataURL(this.files[0]);
};

function upload() {
    const section = document.getElementById('sec').value;
    const text = document.getElementById('txt').value;
    const url = document.getElementById('link').value;
    if(!text) return alert("Please enter text");

    const newItem = {
        id: Date.now(),
        text: text,
        url: url,
        time: Date.now()
    };

    const data = JSON.parse(localStorage.getItem('apm_'+section) || '[]');
    data.push(newItem);
    localStorage.setItem('apm_'+section, JSON.stringify(data));
    
    document.getElementById('txt').value = '';
    document.getElementById('link').value = '';
    loadContent();
}

function loadContent() {
    ['notices', 'announcements', 'study', 'practicals'].forEach(s => {
        const box = document.getElementById(s);
        box.innerHTML = '';
        const items = JSON.parse(localStorage.getItem('apm_'+s) || '[]');
        
        items.reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            
            // "NEW" Badge Logic (If less than 24 hours old)
            const isNew = (Date.now() - item.time) < (24 * 60 * 60 * 1000);
            const newTag = isNew ? '<span class="new-tag">NEW</span>' : '';

            div.innerHTML = `<div><b>${item.text}</b>${newTag}</div>`;
            if(item.url) div.innerHTML += `<a href="${item.url}" target="_blank">🔗 View Link</a>`;

            if(isAdmin) {
                const del = document.createElement('button');
                del.className = 'del-btn';
                del.innerText = '🗑 Delete';
                del.onclick = () => {
                    const filtered = items.filter(i => i.id !== item.id);
                    localStorage.setItem('apm_'+s, JSON.stringify(filtered));
                    loadContent();
                };
                div.appendChild(del);
            }
            box.appendChild(div);
        });
    });
}
</script>

</body>
</html>
