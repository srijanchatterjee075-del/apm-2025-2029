<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM 2025-2029 | Portal</title>
    <style>
        :root {
            --primary: #8a2be2; /* BlueViolet */
            --accent: #ee82ee; /* Violet */
            --bg: #0a0a0a;
            --card: #1a1a1a;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 100px;
            text-align: center;
        }

        header {
            background: var(--primary);
            padding: 20px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        /* Profile Section */
        #profileBox {
            position: absolute;
            top: 80px;
            right: 20px;
            background: var(--card);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--primary);
        }

        #profilePic {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            background: #222;
            display: block;
            margin: 0 auto 5px;
        }

        .file-input-label {
            font-size: 10px;
            cursor: pointer;
            color: var(--accent);
        }

        /* Sections */
        .section {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card);
            border-left: 5px solid var(--primary);
            border-radius: 8px;
            text-align: left;
        }

        h2 { color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; }

        input, select, button {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }

        button {
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); transform: translateY(-2px); }

        .delete-btn {
            background: #ff4444;
            font-size: 10px;
            padding: 4px 8px;
            margin-left: 10px;
        }

        /* Chatbot Container */
        #chatbot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: #111;
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #chatHeader {
            background: var(--primary);
            padding: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chatMessages {
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
            background: #000;
        }

        .chat-row { margin-bottom: 10px; }
        .user-text { color: var(--accent); }
        .bot-text { color: #50fa7b; font-style: italic; }

        .chat-controls { display: flex; padding: 5px; }
        #chatInput { flex: 1; border-radius: 5px 0 0 5px; }
        #chatBtn { border-radius: 0 5px 5px 0; }

        img.uploaded-img { max-width: 100%; border-radius: 5px; margin-top: 10px; }
        a.pdf-link { color: #00f2ff; text-decoration: none; font-weight: bold; }
    </style>
</head>

<body>

<header>APM 2025-2029</header>

<div id="profileBox">
    <img id="profilePic" src="https://via.placeholder.com/80" alt="User">
    <label class="file-input-label">
        Change Photo
        <input type="file" id="dpUpload" accept="image/*" style="display:none">
    </label>
</div>

<div class="section">
    <h2>Admin Dashboard</h2>
    <input type="password" id="pass" placeholder="Admin Password">
    <select id="sectionSelect">
        <option value="notice">📢 Important Notice</option>
        <option value="announcement">📣 Announcement</option>
        <option value="study">📚 Study Material</option>
        <option value="practical">🔬 Practical</option>
    </select>
    <br>
    <input type="text" id="textInput" placeholder="Enter message or title..." style="width: 90%;">
    <br>
    <input type="file" id="fileInput">
    <br>
    <button onclick="uploadContent()">🚀 Post to Portal</button>
</div>

<div class="section"><h2>📢 Important Notice</h2><div id="notice"></div></div>
<div class="section"><h2>📣 Announcement</h2><div id="announcement"></div></div>
<div class="section"><h2>📚 Study Material</h2><div id="study"></div></div>
<div class="section"><h2>🔬 Practical</h2><div id="practical"></div></div>

<div id="chatbot">
    <div id="chatHeader"><span>🤖 APM Assistant</span> <small>Auto-Google</small></div>
    <div id="chatMessages">
        <div class="bot-text">Type anything to search Google instantly!</div>
    </div>
    <div class="chat-controls">
        <input type="text" id="chatInput" placeholder="Ask me anything...">
        <button id="chatBtn" onclick="ask()">Send</button>
    </div>
</div>

<script>
const ADMIN_PASS = "apmarya81120252026chatt9476gcetts";

// Load data on start
window.onload = () => {
    const savedPic = localStorage.getItem("apm_profile_pic");
    if(savedPic) document.getElementById("profilePic").src = savedPic;
};

// Profile Upload with Persistence
document.getElementById("dpUpload").addEventListener("change", function() {
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById("profilePic").src = e.target.result;
        localStorage.setItem("apm_profile_pic", e.target.result);
    };
    reader.readAsDataURL(this.files[0]);
});

// Admin Upload Logic
function uploadContent() {
    const pass = document.getElementById("pass").value;
    if(pass !== ADMIN_PASS) return alert("Unauthorized Access!");

    const sectionId = document.getElementById("sectionSelect").value;
    const text = document.getElementById("textInput").value;
    const file = document.getElementById("fileInput").files[0];
    const container = document.getElementById(sectionId);

    const entry = document.createElement("div");
    entry.style.padding = "10px";
    entry.style.borderBottom = "1px solid #333";

    if(text) {
        const p = document.createElement("p");
        p.textContent = text;
        entry.appendChild(p);
    }

    if(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = e.target.result;
                img.className = "uploaded-img";
                entry.appendChild(img);
            } else {
                const link = document.createElement("a");
                link.href = e.target.result;
                link.className = "pdf-link";
                link.textContent = "📄 View Document (" + file.name + ")";
                link.target = "_blank";
                entry.appendChild(link);
            }
        };
        reader.readAsDataURL(file);
    }

    const del = document.createElement("button");
    del.textContent = "Delete";
    del.className = "delete-btn";
    del.onclick = () => entry.remove();
    
    entry.appendChild(del);
    container.prepend(entry);
    
    // Clear inputs
    document.getElementById("textInput").value = "";
    document.getElementById("fileInput").value = "";
}

// Chatbot - Automatic Google Redirect
function ask() {
    const input = document.getElementById("chatInput").value;
    if(!input) return;

    const chatBox = document.getElementById("chatMessages");

    // Add User Message
    const userDiv = document.createElement("div");
    userDiv.className = "chat-row user-text";
    userDiv.innerHTML = "<b>You:</b> " + input;
    chatBox.appendChild(userDiv);

    // Add Bot Response
    const botDiv = document.createElement("div");
    botDiv.className = "chat-row bot-text";
    botDiv.innerHTML = "<b>Bot:</b> Redirecting to Google...";
    chatBox.appendChild(botDiv);

    // AUTO REDIRECT TO GOOGLE
    setTimeout(() => {
        window.open(`https://www.google.com/search?q=${encodeURIComponent(input)}`, '_blank');
    }, 500);

    // Reset UI
    document.getElementById("chatInput").value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Allow Enter key to trigger search
document.getElementById("chatInput").addEventListener("keypress", (e) => {
    if(e.key === "Enter") ask();
});
</script>

</body>
</html>
