<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTECH 25-29</title>

<style>
body {margin:0;font-family:Arial;background:#0b0b0f;color:white;}
header {text-align:center;padding:15px;font-size:26px;font-weight:bold;}
header span {color:violet;}
.container {padding:10px;max-width:800px;margin:auto;}
.section {background:#111;margin:10px 0;padding:15px;border-radius:12px;}
.section h3 {color:violet;}

/* NOTE BOX */
.note-box {
position:fixed;left:10px;top:50%;transform:translateY(-50%);
width:220px;background:#111;padding:10px;border-radius:10px;
}
.note-box textarea, .note-box input {
width:100%;margin-top:5px;padding:5px;background:black;color:white;border:1px solid #333;
}

/* CLOCK */
.clock {
text-align:center;margin-top:10px;font-size:14px;color:#ccc;
}

/* TODO */
.todo {
background:#111;margin:10px;padding:10px;border-radius:10px;
}
.todo input {width:100%;padding:5px;margin-top:5px;}

.chatbot {position:fixed;bottom:10px;left:10px;width:250px;background:#111;padding:10px;border-radius:10px;}
.chatbot input {width:100%;padding:5px;}
</style>
</head>

<body>

<header>BTECH <span>25 29</span></header>

<!-- NOTE BOX -->
<div class="note-box">
<b>Notes (only you can see)</b>
<div id="noteTime"></div>
<textarea id="noteText" placeholder="Write note..."></textarea>
<input id="noteLink" placeholder="Add link">
<input type="file" id="noteFile">
<button onclick="saveNote()">Save</button>
<button onclick="deleteNote()">Delete</button>
<div id="noteDisplay"></div>
</div>

<div class="container">

<div class="section"><h3>Notice</h3><p>NO UPDATE</p></div>
<div class="section"><h3>Books</h3><p>NO UPDATE</p></div>
<div class="section"><h3>Practical</h3><p>NO UPDATE</p></div>

<div class="section">
<h3>Important Notes</h3>
<p>math play list for 2nd sem</p>
<a href="https://youtube.com/playlist?list=PLn3Wz38keZOfqVnFaM5bhlGVj8pnKntfW&si=TkjuvCdfZabbt4WY" target="_blank">Open Playlist</a>
</div>

<!-- CLOCK -->
<div class="clock" id="clock"></div>

<!-- TODO -->
<div class="todo">
<b>Todo List</b>
<input id="todoInput" placeholder="Add task">
<label><input type="checkbox" id="toggleTime"> Show Time/Date</label>
<button onclick="addTodo()">Add</button>
<div id="todoList"></div>
</div>

</div>

<!-- CHATBOT -->
<div class="chatbot">
🤖<br>
<input id="chatInput" placeholder="Type message..." onkeydown="chat(event)">
<div id="chatOutput"></div>
</div>

<script>
// CLOCK INDIA
function updateClock(){
let now=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
document.getElementById("clock").innerText=now;
document.getElementById("noteTime").innerText=now;
}
setInterval(updateClock,1000);
updateClock();

// NOTES
function saveNote(){
let text=document.getElementById("noteText").value;
let link=document.getElementById("noteLink").value;
let file=document.getElementById("noteFile").files[0];

let reader=new FileReader();
reader.onload=function(e){
let data={text,link,file:e.target.result};
localStorage.setItem("note",JSON.stringify(data));
displayNote();
}
if(file){reader.readAsDataURL(file);} else {
let data={text,link};
localStorage.setItem("note",JSON.stringify(data));
displayNote();
}
}

function displayNote(){
let n=JSON.parse(localStorage.getItem("note"));
if(!n) return;
let html=`<p>${n.text}</p>`;
if(n.link) html+=`<a href='${n.link}' target='_blank'>Open Link</a>`;
if(n.file) html+=`<br><a href='${n.file}' target='_blank'>Open File</a>`;
document.getElementById("noteDisplay").innerHTML=html;
}

function deleteNote(){
localStorage.removeItem("note");
document.getElementById("noteDisplay").innerHTML="";
}

displayNote();

// TODO
function addTodo(){
let val=document.getElementById("todoInput").value;
let showTime=document.getElementById("toggleTime").checked;
let now=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
let text=showTime ? val+" ("+now+")" : val;
let list=document.getElementById("todoList");
let div=document.createElement("div");
div.innerHTML=text;
div.onclick=function(){div.remove();}
list.appendChild(div);
}

// CHAT
function chat(e){
if(e.key==='Enter'){
let msg=e.target.value.toLowerCase();
let out=document.getElementById("chatOutput");
if(msg.includes("hi")||msg.includes("hello")||msg.includes("hey")){
out.innerHTML="Hi I am APM chatbot, how can I help you?";
}else{
window.open("https://www.google.com/search?q="+msg);
out.innerHTML="For more contact CRS...";
}
e.target.value="";
}
}
</script>

</body>
</html>
